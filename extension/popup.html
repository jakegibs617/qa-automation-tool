<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QA Automation Recorder</title>
    <style>
      :root {
        --accent: #1f8a76;
        --danger: #b3261e;
        --border: #e2e6ea;
        --muted: #6b7280;
      }
      body {
        font: 13px/1.5 system-ui, -apple-system, sans-serif;
        margin: 0;
        width: 340px;
        color: #111827;
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
      }
      header h1 {
        font-size: 14px;
        margin: 0;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #9ca3af;
      }
      .dot.live {
        background: var(--danger);
        box-shadow: 0 0 0 0 rgba(179, 38, 30, 0.5);
        animation: pulse 1.2s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(179, 38, 30, 0.5);
        }
        50% {
          box-shadow: 0 0 0 5px rgba(179, 38, 30, 0);
        }
      }
      .body {
        padding: 12px 14px;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }
      button {
        font: inherit;
        flex: 1;
        height: 32px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: #fff;
        cursor: pointer;
      }
      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      button.stop {
        background: var(--danger);
        border-color: var(--danger);
        color: #fff;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .count {
        color: var(--muted);
        margin-bottom: 6px;
      }
      textarea {
        width: 100%;
        height: 150px;
        box-sizing: border-box;
        resize: vertical;
        font: 11px/1.4 ui-monospace, Menlo, monospace;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px;
      }
      .hint {
        color: var(--muted);
        margin-top: 8px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <header>
      <span id="dot" class="dot"></span>
      <h1>QA Automation Recorder</h1>
    </header>
    <div class="body">
      <div class="row">
        <button id="toggle" class="primary">Start recording</button>
        <button id="clear">Clear</button>
      </div>
      <p class="count"><span id="count">0</span> steps recorded</p>
      <textarea id="output" readonly spellcheck="false"></textarea>
      <div class="row" style="margin-top: 10px">
        <button id="copy">Copy steps JSON</button>
      </div>
      <p class="hint">
        Paste the JSON into the test definition's steps field in the QA
        Automation app.
      </p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
