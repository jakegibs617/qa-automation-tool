services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qa_automation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qa_automation"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
